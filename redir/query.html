<script>
(function () {
  const PHONE = "556131422898";

  const i18n = {
    "pt-BR": {
      htmlLang: "pt-BR",
      eyebrow: "NEGOCIAÇÃO DE DOMÍNIO",
      intro: "Se este domínio é de seu interesse e deseja adquiri-lo, faça uma proposta.",
      domainLabel: "DOMÍNIO INFORMADO",
      offerLabel: "Valor proposto",
      button: "Prosseguir com proposta",
      error: "Informe um valor válido para prosseguir.",
      currencySymbol: "R$",
      locale: "pt-BR",
      currency: "BRL",
      fallbackDomain: "este domínio",
      buildMessage(domain, value) {
        return "Olá, tenho interesse no domínio " + domain + ".\n\n" +
               "*Faço-lhe uma oferta inicial no valor de:* " + value;
      }
    },
    "en-US": {
      htmlLang: "en-US",
      eyebrow: "DOMAIN NEGOTIATION",
      intro: "If this domain is of interest to you and you would like to acquire it, submit an offer.",
      domainLabel: "DOMAIN PROVIDED",
      offerLabel: "Proposed amount",
      button: "Proceed with offer",
      error: "Enter a valid amount to continue.",
      currencySymbol: "$",
      locale: "en-US",
      currency: "USD",
      fallbackDomain: "this domain",
      buildMessage(domain, value) {
        return "Hello, I am interested in the domain " + domain + ".\n\n" +
               "*My initial offer is:* " + value;
      }
    }
  };

  const params = new URLSearchParams(window.location.search);
  const rawData = (params.get("data") || "").trim();

  const domainValue = document.getElementById("domainValue");
  const offerInput = document.getElementById("offer");
  const continueBtn = document.getElementById("continueBtn");
  const errorBox = document.getElementById("errorBox");
  const btnPt = document.getElementById("btn-pt");
  const btnEn = document.getElementById("btn-en");

  const eyebrow = document.getElementById("eyebrow");
  const intro = document.getElementById("intro");
  const domainLabel = document.getElementById("domainLabel");
  const offerLabel = document.getElementById("offerLabel");
  const currencySymbol = document.getElementById("currencySymbol");

  let currentLang = "pt-BR";
  let decodedDomain = "";

  function decodeBase64Url(str) {
    try {
      str = str.replace(/-/g, "+").replace(/_/g, "/");
      str += "=".repeat((4 - (str.length % 4)) % 4);

      const binary = atob(str);
      const bytes = Uint8Array.from(binary, c => c.charCodeAt(0));
      return new TextDecoder("utf-8").decode(bytes);
    } catch {
      return "";
    }
  }

  function sanitize(value) {
    return String(value || "")
      .replace(/[<>]/g, "")
      .replace(/\s+/g, " ")
      .trim();
  }

  function updateDomainDisplay() {
    const fallback = i18n[currentLang].fallbackDomain;
    domainValue.textContent = decodedDomain || fallback;
  }

  function digitsOnly(value) {
    return (value || "").replace(/\D/g, "");
  }

  function formatAmountFromDigits(digits, lang) {
    if (!digits) return "";
    const cfg = i18n[lang];
    const number = parseInt(digits, 10) / 100;

    return number.toLocaleString(cfg.locale, {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    });
  }

  function getFormattedCurrencyFromInput(lang) {
    const digits = digitsOnly(offerInput.value);
    if (!digits) return "";
    const cfg = i18n[lang];
    const number = parseInt(digits, 10) / 100;

    return number.toLocaleString(cfg.locale, {
      style: "currency",
      currency: cfg.currency
    });
  }

  function applyLanguage(lang) {
    currentLang = lang;
    const cfg = i18n[lang];

    document.documentElement.lang = cfg.htmlLang;
    eyebrow.textContent = cfg.eyebrow;
    intro.textContent = cfg.intro;
    domainLabel.textContent = cfg.domainLabel;
    offerLabel.textContent = cfg.offerLabel;
    continueBtn.textContent = cfg.button;
    errorBox.textContent = cfg.error;
    currencySymbol.textContent = cfg.currencySymbol;

    btnPt.classList.toggle("active", lang === "pt-BR");
    btnEn.classList.toggle("active", lang === "en-US");

    const digits = digitsOnly(offerInput.value);
    offerInput.value = formatAmountFromDigits(digits, lang);

    updateDomainDisplay();
  }

  decodedDomain = sanitize(decodeBase64Url(rawData));

  offerInput.addEventListener("input", function (e) {
    const digits = digitsOnly(e.target.value);
    e.target.value = formatAmountFromDigits(digits, currentLang);
    errorBox.style.display = "none";
  });

  continueBtn.addEventListener("click", function () {
    const digits = digitsOnly(offerInput.value);

    if (!digits || parseInt(digits, 10) <= 0) {
      errorBox.style.display = "block";
      offerInput.focus();
      return;
    }

    const formattedValue = getFormattedCurrencyFromInput(currentLang);
    const domainForMessage = decodedDomain || i18n[currentLang].fallbackDomain;
    const msg = i18n[currentLang].buildMessage(domainForMessage, formattedValue);

    const url =
      "https://api.whatsapp.com/send/?phone=" +
      PHONE +
      "&text=" +
      encodeURIComponent(msg);

    window.location.href = url;
  });

  btnPt.addEventListener("click", function () {
    applyLanguage("pt-BR");
  });

  btnEn.addEventListener("click", function () {
    applyLanguage("en-US");
  });

  applyLanguage("pt-BR");
})();
</script>
