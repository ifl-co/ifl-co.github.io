<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Redirect</title>
<script>
(function () {
    const params = new URLSearchParams(window.location.search);

    // Agora o "domínio" vem do parâmetro ?text=
    let dominio = params.get("text") || "este domínio";

    // Sanitização mínima (evita caracteres problemáticos)
    dominio = dominio.replace(/[<>]/g, "").trim();

    let mensagem = "Olá, tenho interesse no domínio " + dominio + 
        ". Será que podemos negociar?\n\n*Faço-lhe uma oferta inicial no valor de:* ";

    const url = "https://api.whatsapp.com/send/?phone=556131422898&text=" 
        + encodeURIComponent(mensagem) 
        + "&type=phone_number";

    window.location.replace(url);
})();
</script>
</head>
<body></body>
</html>
