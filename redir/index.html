<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Redirect</title>
  <script>
    (function () {
      var mensagem = "Olá, tenho interesse neste nome de domínio! Será que podemos negociá-lo?\n\n *Para facilitar, adianto abaixo uma proposta de valor:*\n";
      var url = "https://api.whatsapp.com/send/?phone=556131422898&text=" +
        encodeURIComponent(mensagem) +
        "&type=phone_number";
      window.location.replace(url);
    })();
  </script>
</head>
<body></body>
</html>
